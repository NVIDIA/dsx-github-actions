name: 'CodeQL Security Scan'
description: 'Performs static code analysis using GitHub CodeQL to identify security vulnerabilities'

inputs:
  languages:
    description: 'Programming language to analyze (e.g., go, rust, python, javascript, cpp)'
    required: false
    default: 'go'
  build-mode:
    description: 'Build mode: autobuild, manual, or none. Use "none" for Rust, "manual" for Go/C++/Java'
    required: false
    default: 'autobuild'
  build-command:
    description: 'Build command to execute (only used when build-mode is manual)'
    required: false
    default: 'make build-all'
  category:
    description: 'CodeQL analysis category'
    required: false
    default: '/language:default'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Security (requires GitHub Advanced Security). Set to false if GHAS is not enabled.'
    required: false
    default: 'true'
  skip-build:
    description: 'Skip build step. Use with build-mode: none when no build is required. Note: Traced languages (Go, C++, Java) cannot use pre-built artifacts.'
    required: false
    default: 'false'
  post-pr-comment:
    description: 'Post CodeQL results as PR comment by parsing SARIF file (works without GHAS, requires pull-requests: write permission).'
    required: false
    default: 'false'
  fail-on-findings:
    description: 'Fail the workflow if security issues are found (quality gate). Set to false to only warn.'
    required: false
    default: 'true'
  fail-on-severity:
    description: 'Minimum severity level to fail the workflow. Options: error (critical/high only), warning (medium+), note (all issues). Only applies when fail-on-findings is true.'
    required: false
    default: 'error'
  github-token:
    description: 'GitHub token for CodeQL actions'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Initialize CodeQL
      uses: github/codeql-action/init@fdbfb4d2750291e159f0156def62b853c2798ca2 # v4.31.5, use sha to align security guidelines
      with:
        languages: ${{ inputs.languages }}
        build-mode: ${{ inputs.build-mode }}
        token: ${{ inputs.github-token }}
      env:
        CODEQL_EXTRACTOR_GO_BUILD_TRACING: on

    - name: Build with CodeQL
      if: inputs.build-mode == 'manual' && inputs.skip-build != 'true'
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Perform CodeQL Analysis
      id: codeql-analyze
      uses: github/codeql-action/analyze@fdbfb4d2750291e159f0156def62b853c2798ca2 # v4.31.5, use sha to align security guidelines
      with:
        category: ${{ inputs.category }}
        upload: ${{ inputs.upload-sarif }}
        output: ${{ github.workspace }}/results
        token: ${{ inputs.github-token }}

    - name: Post CodeQL Results to PR
      if: inputs.post-pr-comment == 'true'
      shell: bash
      run: |
        # Marker for finding/updating existing comment
        COMMENT_MARKER="<!-- dsx-codeql-scan -->"

        # Determine if we're in a PR context
        PR_NUMBER=""
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
        elif [[ "${{ github.ref }}" =~ ^refs/heads/pull-request/([0-9]+) ]]; then
          PR_NUMBER="${BASH_REMATCH[1]}"
        else
          # Try to find PR number from commit
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
        fi

        if [ -z "$PR_NUMBER" ]; then
          echo "⚠️ Not in a PR context, skipping PR comment"
          exit 0
        fi

        echo "🔍 Searching for SARIF files..."
        echo "Working directory: $(pwd)"
        echo "Workspace: ${{ github.workspace }}"

        # Find SARIF file (CodeQL outputs to results directory)
        SARIF_FILE=$(find ${{ github.workspace }}/results -name "*.sarif" -type f 2>/dev/null | head -1)

        if [ -z "$SARIF_FILE" ]; then
          echo "⚠️ No SARIF file found in results directory, skipping PR comment"
          echo "Searching in entire workspace..."
          SARIF_FILE=$(find ${{ github.workspace }} -name "*.sarif" -type f 2>/dev/null | head -1)
          if [ -z "$SARIF_FILE" ]; then
            echo "⚠️ No SARIF file found anywhere, skipping PR comment"
            exit 0
          fi
        fi

        echo "✅ Found SARIF file: $SARIF_FILE"

        # Parse SARIF for issue count and details
        TOTAL_ISSUES=$(jq '[.runs[].results // []] | add | length' "$SARIF_FILE" 2>/dev/null || echo "0")

        # Determine current status
        if [ "$TOTAL_ISSUES" -eq 0 ]; then
          CURRENT_STATUS="clean"
        else
          CURRENT_STATUS="issues_found"
        fi

        # Use the correct commit SHA (PR head commit for pull_request event, otherwise github.sha)
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
        else
          COMMIT_SHA="${{ github.sha }}"
        fi
        SHORT_SHA="${COMMIT_SHA:0:7}"

        # Determine footer message based on upload-sarif setting
        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          FOOTER="🔗 [View full details in Security tab](https://github.com/${{ github.repository }}/security/code-scanning)"
        else
          FOOTER="💡 **Note**: Enable GitHub Advanced Security to see full details in the Security tab."
        fi

        if [ "$TOTAL_ISSUES" -eq 0 ]; then
          REPORT="${COMMENT_MARKER}
        ## 🛡️ CodeQL Analysis
        ✅ No security issues found!

        $FOOTER

        <sub>🕐 Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Commit: ${SHORT_SHA}</sub>"
        else
          # Get severity breakdown
          ERRORS=$(jq '[.runs[].results // [] | .[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          WARNINGS=$(jq '[.runs[].results // [] | .[] | select(.level == "warning")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          NOTES=$(jq '[.runs[].results // [] | .[] | select(.level == "note")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")

          REPORT="${COMMENT_MARKER}
        ## 🛡️ CodeQL Analysis
        🚨 Found **$TOTAL_ISSUES** issue(s)

        **Severity Breakdown:**
        - 🔴 Errors: $ERRORS
        - 🟡 Warnings: $WARNINGS
        - 🔵 Notes: $NOTES

        <details>
        <summary>📋 Top Issues</summary>

        $(jq -r '[.runs[].results // [] | .[] | select(.level == "error" or .level == "warning")] | .[0:5] | .[] | "- **\(.ruleId // "unknown")**: \(.message.text // "No description") (\(.locations[0].physicalLocation.artifactLocation.uri // "unknown"):\(.locations[0].physicalLocation.region.startLine // "?"))"' "$SARIF_FILE" 2>/dev/null || echo "No details available")

        </details>

        $FOOTER

        <sub>🕐 Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Commit: ${SHORT_SHA}</sub>"
        fi

        # Find existing comment from github-actions[bot] with our marker
        EXISTING_COMMENT=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
          --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- dsx-codeql-scan -->")) | {id, body}' \
          2>/dev/null | head -1 || echo "")

        EXISTING_COMMENT_ID=""
        PREVIOUS_STATUS=""
        if [ -n "$EXISTING_COMMENT" ]; then
          EXISTING_COMMENT_ID=$(echo "$EXISTING_COMMENT" | jq -r '.id' 2>/dev/null || echo "")
          EXISTING_BODY=$(echo "$EXISTING_COMMENT" | jq -r '.body' 2>/dev/null || echo "")

          # Parse previous status from existing comment body
          if echo "$EXISTING_BODY" | grep -q "No security issues found"; then
            PREVIOUS_STATUS="clean"
          elif echo "$EXISTING_BODY" | grep -q "Found \*\*"; then
            PREVIOUS_STATUS="issues_found"
          else
            PREVIOUS_STATUS="unknown"
          fi
          echo "📊 Previous status: $PREVIOUS_STATUS | Current status: $CURRENT_STATUS"
        fi

        # Decide whether to update/create comment
        if [ -n "$EXISTING_COMMENT_ID" ]; then
          if [ "$PREVIOUS_STATUS" == "$CURRENT_STATUS" ]; then
            echo "⏭️ Status unchanged ($CURRENT_STATUS), skipping comment update"
          else
            echo "📝 Status changed ($PREVIOUS_STATUS → $CURRENT_STATUS), updating comment (ID: $EXISTING_COMMENT_ID)"
            echo -e "$REPORT" | gh api "/repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH \
              --field body=@-
          fi
        else
          echo "📝 Creating new comment (status: $CURRENT_STATUS)"
          echo -e "$REPORT" | gh pr comment "$PR_NUMBER" --body-file=-
        fi
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Quality Gate
      if: always()
      shell: bash
      run: |
        # Enforce quality gate if enabled
        if [ "${{ inputs.fail-on-findings }}" != "true" ]; then
          echo "⚠️ Quality Gate: DISABLED (fail-on-findings=false)"
          exit 0
        fi

        # Find SARIF file
        SARIF_FILE=$(find ${{ github.workspace }}/results -name "*.sarif" -type f 2>/dev/null | head -1)

        if [ -z "$SARIF_FILE" ]; then
          echo "⚠️ No SARIF file found, cannot determine if issues exist"
          exit 0
        fi

        # Count issues by severity level
        ERRORS=$(jq '[.runs[].results // [] | .[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        WARNINGS=$(jq '[.runs[].results // [] | .[] | select(.level == "warning")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        NOTES=$(jq '[.runs[].results // [] | .[] | select(.level == "note")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        TOTAL_ISSUES=$((ERRORS + WARNINGS + NOTES))

        echo "📊 CodeQL Results:"
        echo "  - Total Issues: $TOTAL_ISSUES"
        echo "  - 🔴 Errors (Critical/High): $ERRORS"
        echo "  - 🟡 Warnings (Medium): $WARNINGS"
        echo "  - 🔵 Notes (Low/Info): $NOTES"
        echo ""

        # Determine which severity levels to fail on
        FAIL_ON_SEVERITY="${{ inputs.fail-on-severity }}"
        FAIL_COUNT=0
        FAIL_LEVELS=""

        case "$FAIL_ON_SEVERITY" in
          "error")
            FAIL_COUNT=$ERRORS
            FAIL_LEVELS="errors (critical/high)"
            echo "🎯 Quality Gate Threshold: Fail on ERRORS only"
            ;;
          "warning")
            FAIL_COUNT=$((ERRORS + WARNINGS))
            FAIL_LEVELS="errors and warnings (medium+)"
            echo "🎯 Quality Gate Threshold: Fail on ERRORS and WARNINGS"
            ;;
          "note"|"all")
            FAIL_COUNT=$TOTAL_ISSUES
            FAIL_LEVELS="all issues"
            echo "🎯 Quality Gate Threshold: Fail on ALL issues"
            ;;
          *)
            echo "⚠️ Invalid fail-on-severity: $FAIL_ON_SEVERITY, defaulting to 'error'"
            FAIL_COUNT=$ERRORS
            FAIL_LEVELS="errors (critical/high)"
            echo "🎯 Quality Gate Threshold: Fail on ERRORS only"
            ;;
        esac

        if [ "$FAIL_COUNT" -gt 0 ]; then
          echo ""
          echo "❌ Quality Gate: FAILED"
          echo "CodeQL detected $FAIL_COUNT $FAIL_LEVELS in the code."
          echo "Please review and fix the issues before merging."
          exit 1
        else
          echo ""
          echo "✅ Quality Gate: PASSED"
          echo "No $FAIL_LEVELS detected by CodeQL."
          exit 0
        fi

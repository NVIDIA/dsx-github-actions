name: 'Go Test'
description: 'Run Go tests with race detection, coverage reporting, and JUnit output'

inputs:
  go-version:
    description: 'Go version to use (e.g., 1.25.5). If empty, uses go.mod version.'
    required: false
    default: ''
  go-version-file:
    description: 'Path to go.mod for version detection. Used when go-version is empty.'
    required: false
    default: 'go.mod'
  working-directory:
    description: 'Working directory for running tests'
    required: false
    default: '.'
  packages:
    description: 'Go packages to test (e.g., ./... or ./src/...)'
    required: false
    default: './...'
  race:
    description: 'Enable race detector'
    required: false
    default: 'true'
  coverage:
    description: 'Enable coverage reporting'
    required: false
    default: 'true'
  coverage-file:
    description: 'Coverage output file name'
    required: false
    default: 'coverage.out'
  junit:
    description: 'Generate JUnit XML report via gotestsum'
    required: false
    default: 'true'
  junit-file:
    description: 'JUnit XML output file name'
    required: false
    default: 'junit-report.xml'
  test-flags:
    description: 'Additional flags passed to go test (e.g., -v -count=1 -timeout=10m)'
    required: false
    default: '-v -count=1'
  go-flags:
    description: 'GOFLAGS environment variable (e.g., -mod=vendor)'
    required: false
    default: ''
  upload-artifacts:
    description: 'Upload coverage and JUnit reports as workflow artifacts'
    required: false
    default: 'true'

outputs:
  coverage-file:
    description: 'Path to coverage output file'
    value: ${{ inputs.working-directory }}/${{ inputs.coverage-file }}
  junit-file:
    description: 'Path to JUnit XML report'
    value: ${{ inputs.working-directory }}/${{ inputs.junit-file }}

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version == '' && inputs.go-version-file || '' }}
        cache: true
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum

    - name: Install gotestsum
      if: inputs.junit == 'true'
      shell: bash
      run: go install gotest.tools/gotestsum@latest

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GOFLAGS: ${{ inputs.go-flags }}
      run: |
        # Build test flags
        TEST_FLAGS="${{ inputs.test-flags }}"
        if [ "${{ inputs.race }}" = "true" ]; then
          TEST_FLAGS="-race ${TEST_FLAGS}"
        fi
        if [ "${{ inputs.coverage }}" = "true" ]; then
          TEST_FLAGS="-coverprofile=${{ inputs.coverage-file }} -covermode=atomic ${TEST_FLAGS}"
        fi

        echo "::group::go test ${TEST_FLAGS} ${{ inputs.packages }}"
        if [ "${{ inputs.junit }}" = "true" ]; then
          gotestsum \
            --junitfile "${{ inputs.junit-file }}" \
            --format testdox \
            -- ${TEST_FLAGS} ${{ inputs.packages }}
        else
          go test ${TEST_FLAGS} ${{ inputs.packages }}
        fi
        echo "::endgroup::"

    - name: Display coverage summary
      if: inputs.coverage == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "${{ inputs.coverage-file }}" ]; then
          echo "::group::Coverage Summary"
          go tool cover -func="${{ inputs.coverage-file }}" | tail -1
          echo "::endgroup::"
        fi

    - name: Upload test artifacts
      if: inputs.upload-artifacts == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: go-test-results
        path: |
          ${{ inputs.working-directory }}/${{ inputs.coverage-file }}
          ${{ inputs.working-directory }}/${{ inputs.junit-file }}
        if-no-files-found: ignore
        retention-days: 7

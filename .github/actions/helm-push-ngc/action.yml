name: "Helm Push NGC"
description: "Pushes a Helm Chart to NGC"
inputs:
  package-dir:
    description: "Directory of the .tgz artifact"
    required: false
    default: "package"
  ngc-key:
    description: "Key to use for NGC authentication"
    required: true
  ngc-path:
    description: "Org and Team path on NGC"
    required: true
  ngc-duplicate:
    description: "Action for duplicate Helm Chart versions: skip, overwrite, fail"
    required: false
    default: "skip"
  ngc-registry:
    description: "NGC registry address"
    required: false
    default: "https://helm.ngc.nvidia.com/"

outputs:
  chart-name:
    description: "The name of the chart"
    value: ${{ steps.set_outputs.outputs.chart-name }}
  chart-version:
    description: "The version of the chart"
    value: ${{ steps.set_outputs.outputs.chart-version }}
  push-skipped:
    description: "Whether the push was skipped"
    value: ${{ steps.set_outputs.outputs.push-skipped }}

runs:
  using: "composite"
  steps:
    - uses: dcarbone/install-jq-action@v1.0.1
    - uses: dcarbone/install-yq-action@v1.1.1

    - name: Install Helm
      shell: bash
      run: |
        "${{ github.action_path }}/../helm-shared/scripts/install-helm.sh"

    - name: Install NGC CLI
      shell: bash
      run: |
        "${{ github.action_path }}/../helm-shared/scripts/install-ngc.sh"

    - name: Init Push
      shell: bash
      env:
        CC_HELM_PACKAGE_DIR: ${{ inputs.package-dir }}
        CC_HELM_NGC_KEY: ${{ inputs.ngc-key }}
        CC_HELM_NGC_PATH: ${{ inputs.ngc-path }}
        CC_HELM_NGC_REGISTRY: ${{ inputs.ngc-registry }}
        HELM_NGC_DUPLICATE: ${{ inputs.ngc-duplicate }}
        CC_HELM_NGC_PUSH: "true"
      run: |
        UTILS_PATH="${{ github.action_path }}/../helm-shared/scripts/utils.sh"
        "$UTILS_PATH" helm_init_push

    - name: Push to NGC
      id: push
      shell: bash
      env:
        # Re-passing necessary vars that might be needed by ngc-repo-add/push
        # though they mainly rely on init setting vars in GITHUB_ENV
        CC_HELM_NGC_KEY: ${{ inputs.ngc-key }}
        CC_HELM_NGC_PATH: ${{ inputs.ngc-path }}
        CC_HELM_NGC_REGISTRY: ${{ inputs.ngc-registry }}
        CC_HELM_NGC_PUSH: "true"
      run: |
        UTILS_PATH="${{ github.action_path }}/../helm-shared/scripts/utils.sh"
        "$UTILS_PATH" helm_ngc_repo_add
        "$UTILS_PATH" helm_ngc_push
        "$UTILS_PATH" helm_check_push_errors

    - name: Set Outputs
      id: set_outputs
      shell: bash
      run: |
        echo "chart-name=${CC_HELM_CHART_NAME}" >> "$GITHUB_OUTPUT"
        echo "chart-version=${CC_HELM_CHART_VERSION}" >> "$GITHUB_OUTPUT"
        if [[ "${CC_HELM_NGC_PUSH_STATUS:-}" == "skipped" ]]; then
          echo "push-skipped=true" >> "$GITHUB_OUTPUT"
        else
          echo "push-skipped=false" >> "$GITHUB_OUTPUT"
        fi

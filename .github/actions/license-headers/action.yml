name: 'License Headers Check'
description: 'Check (and optionally add) SPDX license headers using addlicense'

inputs:
  license:
    description: 'License type (apache, mit, bsd)'
    required: false
    default: 'apache'
  copyright-holder:
    description: 'Copyright holder string'
    required: false
    default: 'NVIDIA CORPORATION & AFFILIATES. All rights reserved.'
  year:
    description: 'Copyright year'
    required: false
    default: '2026'
  paths:
    description: 'Space-separated paths to check (e.g., "src/ pkg/ cmd/")'
    required: false
    default: '.'
  ignore:
    description: 'Comma-separated glob patterns to ignore (e.g., "vendor/**,tests/**")'
    required: false
    default: 'vendor/**'
  check-only:
    description: 'Only check headers (fail if missing). Set to false to auto-add missing headers.'
    required: false
    default: 'true'
  addlicense-version:
    description: 'addlicense tool version'
    required: false
    default: 'b289835c0741ba2fb92dd5f61af070e79c69a55e' # v1.2.0
  go-version:
    description: 'Go version for installing addlicense. If empty, uses existing Go installation.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      if: inputs.go-version != ''
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Install addlicense
      shell: bash
      env:
        ADDLICENSE_VERSION: ${{ inputs.addlicense-version }}
      run: go install "github.com/google/addlicense@${ADDLICENSE_VERSION}"

    - name: Check license headers
      shell: bash
      env:
        INPUT_LICENSE: ${{ inputs.license }}
        INPUT_COPYRIGHT: ${{ inputs.copyright-holder }}
        INPUT_YEAR: ${{ inputs.year }}
        INPUT_IGNORE: ${{ inputs.ignore }}
        INPUT_CHECK_ONLY: ${{ inputs.check-only }}
        INPUT_PATHS: ${{ inputs.paths }}
      run: |
        # Build command as an array to preserve flag boundaries
        CMD=(addlicense -l "$INPUT_LICENSE" -c "$INPUT_COPYRIGHT" -s=only -y "$INPUT_YEAR")

        # Add ignore flags
        IFS=',' read -ra PATTERNS <<< "$INPUT_IGNORE"
        for pattern in "${PATTERNS[@]}"; do
          pattern=$(echo "$pattern" | xargs) # trim whitespace
          if [ -n "$pattern" ]; then
            CMD+=(-ignore "$pattern")
          fi
        done

        # Add check flag
        if [ "$INPUT_CHECK_ONLY" = "true" ]; then
          CMD+=(-check)
          echo "Checking license headers (check-only mode)..."
        else
          echo "Adding missing license headers..."
        fi

        # Add paths last (positional args must come after flags)
        # shellcheck disable=SC2206
        CMD+=($INPUT_PATHS)

        # Run
        "${CMD[@]}"

        if [ "$INPUT_CHECK_ONLY" = "true" ]; then
          echo "License headers check passed."
        else
          echo "Missing license headers added successfully."
        fi

name: 'Trivy Security Scan'
description: 'Performs comprehensive vulnerability scanning using Trivy to detect security issues'

inputs:
  scan-type:
    description: 'Type of scan (fs for filesystem, image for container)'
    required: false
    default: 'fs'
  scan-ref:
    description: 'Path or reference to scan'
    required: false
    default: '.'
  vuln-type:
    description: 'Vulnerability types to check'
    required: false
    default: 'os,library'
  scanners:
    description: 'Scanners to use (comma-separated: vuln,secret,misconfig,license)'
    required: false
    default: 'vuln,secret,misconfig,license'
  severity:
    description: 'Severity levels to report (comma-separated: LOW,MEDIUM,HIGH,CRITICAL)'
    required: false
    default: 'HIGH,CRITICAL'
  skip-dirs:
    description: 'Directories to skip (comma-separated)'
    required: false
    default: 'vendor,node_modules'
  ignore-unfixed:
    description: 'Ignore unfixed vulnerabilities'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Security (requires GitHub Advanced Security). Set to false if GHAS is not enabled.'
    required: false
    default: 'true'
  post-pr-comment:
    description: 'Post vulnerability scan results as PR comment by parsing SARIF file (requires pull-requests: write permission).'
    required: false
    default: 'false'
  fail-on-findings:
    description: 'Fail the workflow if vulnerabilities are found (quality gate). Set to false to only warn.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for uploading SARIF results'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Run Trivy Scan
      continue-on-error: true
      uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1, use sha to align security guidelines
      with:
        scan-type: ${{ inputs.scan-type }}
        scan-ref: ${{ inputs.scan-ref }}
        vuln-type: ${{ inputs.vuln-type }}
        scanners: ${{ inputs.scanners }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: 'sarif'
        output: 'vulnerability-scan-results.sarif'
        severity: ${{ inputs.severity }}
        skip-dirs: ${{ inputs.skip-dirs }}
        limit-severities-for-sarif: true

    - name: Check SARIF file exists
      id: check_sarif
      shell: bash
      run: |
        if [ -f "vulnerability-scan-results.sarif" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload SARIF Report
      if: steps.check_sarif.outputs.exists == 'true' && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v4.31.5
      with:
        sarif_file: 'vulnerability-scan-results.sarif'
        token: ${{ inputs.github-token }}

    - name: Post Vulnerability Results to PR
      if: inputs.post-pr-comment == 'true' && steps.check_sarif.outputs.exists == 'true'
      shell: bash
      run: |
        # Marker for finding/updating existing comment
        COMMENT_MARKER="<!-- dsx-trivy-scan -->"

        # Determine if we're in a PR context
        PR_NUMBER=""
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          PR_NUMBER="${{ github.event.pull_request.number }}"
        elif [[ "${{ github.ref }}" =~ ^refs/heads/pull-request/([0-9]+) ]]; then
          PR_NUMBER="${BASH_REMATCH[1]}"
        else
          # Try to find PR number from commit
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
        fi

        if [ -z "$PR_NUMBER" ]; then
          echo "⚠️ Not in a PR context, skipping PR comment"
          exit 0
        fi

        SARIF_FILE="vulnerability-scan-results.sarif"

        # Parse SARIF for issue count and details
        TOTAL_ISSUES=$(jq '[.runs[].results // []] | add | length' "$SARIF_FILE" 2>/dev/null || echo "0")

        # Use the correct commit SHA (PR head commit for pull_request event, otherwise github.sha)
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
        else
          COMMIT_SHA="${{ github.sha }}"
        fi
        SHORT_SHA="${COMMIT_SHA:0:7}"

        # Determine footer message based on upload-sarif setting
        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          FOOTER="🔗 [View full details in Security tab](https://github.com/${{ github.repository }}/security/code-scanning)"
        else
          FOOTER="💡 **Note**: Enable GitHub Advanced Security to see full details in the Security tab."
        fi

        COUNT_MARKER="<!-- dsx-trivy-count:${TOTAL_ISSUES} -->"

        if [ "$TOTAL_ISSUES" -eq 0 ]; then
          REPORT="${COMMENT_MARKER}
        ${COUNT_MARKER}
        ## 🛡️ Vulnerability Scan
        ✅ No vulnerabilities found!

        $FOOTER

        <sub>🕐 Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Commit: ${SHORT_SHA}</sub>"
        else
          # Get severity breakdown
          CRITICAL=$(jq '[.runs[].results // [] | .[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          HIGH=$(jq '[.runs[].results // [] | .[] | select(.level == "warning")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.runs[].results // [] | .[] | select(.level == "note")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")

          REPORT="${COMMENT_MARKER}
        ${COUNT_MARKER}
        ## 🛡️ Vulnerability Scan
        🚨 Found **$TOTAL_ISSUES** vulnerability(ies)

        **Severity Breakdown:**
        - 🔴 Critical/High: $CRITICAL
        - 🟡 Medium: $HIGH
        - 🔵 Low/Info: $MEDIUM

        <details>
        <summary>📋 Top Vulnerabilities</summary>

        $(jq -r '[.runs[].results // [] | .[] | select(.level == "error" or .level == "warning")] | .[0:10] | .[] | "- **\(.ruleId // "unknown")**: \(.message.text // "No description") (\(.locations[0].physicalLocation.artifactLocation.uri // "unknown"))"' "$SARIF_FILE" 2>/dev/null || echo "No details available")

        </details>

        $FOOTER

        <sub>🕐 Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC') | Commit: ${SHORT_SHA}</sub>"
        fi

        # Find existing comment from github-actions[bot] with our marker
        EXISTING_COMMENT=$(gh api "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
          --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- dsx-trivy-scan -->")) | {id, body}' \
          2>/dev/null | head -1 || echo "")

        EXISTING_COMMENT_ID=""
        PREVIOUS_COUNT=""
        if [ -n "$EXISTING_COMMENT" ]; then
          EXISTING_COMMENT_ID=$(echo "$EXISTING_COMMENT" | jq -r '.id' 2>/dev/null || echo "")
          EXISTING_BODY=$(echo "$EXISTING_COMMENT" | jq -r '.body' 2>/dev/null || echo "")

          # Parse previous issue count: try hidden marker first, then fall back to comment text
          PREVIOUS_COUNT=$(echo "$EXISTING_BODY" | grep -oP '(?<=<!-- dsx-trivy-count:)\d+(?= -->)' 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_COUNT" ]; then
            if echo "$EXISTING_BODY" | grep -q "No vulnerabilities found"; then
              PREVIOUS_COUNT="0"
            else
              PREVIOUS_COUNT=$(echo "$EXISTING_BODY" | grep -oP '(?<=Found \*\*)\d+(?=\*\*)' 2>/dev/null || echo "")
            fi
          fi
          if [ -z "$PREVIOUS_COUNT" ]; then
            PREVIOUS_COUNT="unknown"
          fi
          echo "📊 Previous count: $PREVIOUS_COUNT | Current count: $TOTAL_ISSUES"
        fi

        # Decide whether to update/create comment
        if [ -n "$EXISTING_COMMENT_ID" ]; then
          if [ "$PREVIOUS_COUNT" == "$TOTAL_ISSUES" ]; then
            echo "⏭️ Issue count unchanged ($TOTAL_ISSUES), skipping comment update"
          else
            echo "📝 Issue count changed ($PREVIOUS_COUNT → $TOTAL_ISSUES), updating comment (ID: $EXISTING_COMMENT_ID)"
            echo -e "$REPORT" | gh api "/repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH \
              --field body=@-
          fi
        else
          echo "📝 Creating new comment (issues: $TOTAL_ISSUES)"
          echo -e "$REPORT" | gh pr comment "$PR_NUMBER" --body-file=-
        fi
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Quality Gate
      if: always()
      shell: bash
      run: |
        # Enforce quality gate if enabled
        if [ "${{ inputs.fail-on-findings }}" != "true" ]; then
          echo "⚠️ Quality Gate: DISABLED (fail-on-findings=false)"
          exit 0
        fi

        # Check if SARIF file exists
        SARIF_FILE="vulnerability-scan-results.sarif"
        if [ ! -f "$SARIF_FILE" ]; then
          echo "⚠️ No SARIF file found at $SARIF_FILE, cannot determine if vulnerabilities exist"
          exit 0
        fi

        # Count vulnerabilities by severity
        CRITICAL=$(jq '[.runs[].results // [] | .[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        HIGH=$(jq '[.runs[].results // [] | .[] | select(.level == "warning")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
        TOTAL=$(jq '[.runs[].results // []] | add | length' "$SARIF_FILE" 2>/dev/null || echo "0")

        echo "📊 Trivy Scan Results:"
        echo "  - Total Vulnerabilities: $TOTAL"
        echo "  - Critical/High: $((CRITICAL + HIGH))"

        if [ "$TOTAL" -gt 0 ]; then
          echo ""
          echo "❌ Quality Gate: FAILED"
          echo "Trivy detected $TOTAL vulnerability/vulnerabilities in the scan."
          echo "Please review and remediate the issues before merging."
          exit 1
        else
          echo ""
          echo "✅ Quality Gate: PASSED"
          echo "No vulnerabilities detected by Trivy."
          exit 0
        fi

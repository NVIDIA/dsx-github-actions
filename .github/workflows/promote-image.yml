name: Promote Image

on:
  workflow_call:
    inputs:
      source:
        description: "Source image without tag, e.g. nvcr.io/org/app"
        required: true
        type: string
      source_tag:
        description: "Source tag, e.g. 1.0.0"
        required: true
        type: string
      destination:
        description: "Destination image without tag, e.g. ghcr.io/org/app"
        required: true
        type: string
      destination_tag:
        description: "Destination tag, e.g. prod or 1"
        required: true
        type: string
      digest:
        description: "Optional: explicit digest (takes precedence over source_tag)"
        required: false
        type: string
    secrets:
      SOURCE_USERNAME:
        required: true
      SOURCE_PASSWORD:
        required: true
      DEST_USERNAME:
        required: true
      DEST_PASSWORD:
        required: true
    outputs:
      destination_digest:
        description: "Digest after copy completes"
        value: ${{ jobs.promote.outputs.destination_digest }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      destination_digest: ${{ steps.dest_digest.outputs.digest }}
    steps:
      - name: Prepare refs
        id: refs
        shell: bash
        env:
          INPUT_DIGEST: ${{ inputs.digest }}
          INPUT_SOURCE: ${{ inputs.source }}
          INPUT_SOURCE_TAG: ${{ inputs.source_tag }}
          INPUT_DESTINATION: ${{ inputs.destination }}
          INPUT_DESTINATION_TAG: ${{ inputs.destination_tag }}
        run: |
          set -euo pipefail

          # Assemble source reference
          if [[ -n "${INPUT_DIGEST}" ]]; then
            source_ref="${INPUT_SOURCE}@${INPUT_DIGEST}"
          else
            source_ref="${INPUT_SOURCE}:${INPUT_SOURCE_TAG}"
          fi

          # Assemble destination reference
          destination_ref="${INPUT_DESTINATION}:${INPUT_DESTINATION_TAG}"

          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "destination_ref=${destination_ref}" >> "$GITHUB_OUTPUT"

      - name: Copy multi-arch manifest
        shell: bash
        env:
          SRC_USER: ${{ secrets.SOURCE_USERNAME }}
          SRC_PASS: ${{ secrets.SOURCE_PASSWORD }}
          DEST_USER: ${{ secrets.DEST_USERNAME }}
          DEST_PASS: ${{ secrets.DEST_PASSWORD }}

        run: |
          set -eo pipefail
          skopeo copy --all \
            --src-creds "$SRC_USER:$SRC_PASS" \
            --dest-creds "$DEST_USER:$DEST_PASS" \
            "docker://${{ steps.refs.outputs.source_ref }}" \
            "docker://${{ steps.refs.outputs.destination_ref }}"

      - name: Retrieve destination digest
        id: dest_digest
        shell: bash
        env:
          DEST_USER: ${{ secrets.DEST_USERNAME }}
          DEST_PASS: ${{ secrets.DEST_PASSWORD }}
        run: |
          set -eo pipefail
          # Inspect the destination image to retrieve the digest
          digest=$(skopeo inspect --raw \
            --creds "${DEST_USER}:${DEST_PASS}" \
            "docker://${{ steps.refs.outputs.destination_ref }}" | sha256sum | awk '{print "sha256:"$1}')

          echo "digest=${digest}" >>"$GITHUB_OUTPUT"
          echo "destination digest: ${digest}"
